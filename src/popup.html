<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BorealTip</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <div class="brand">BorealTip</div>
      <div class="sub">Ambient watch-time ledger</div>
    </header>

    <main>
      <section class="card">
        <div class="label">Today</div>
        <div class="metric" id="today-total">0m</div>
        <div class="hint" id="today-creators">No data yet</div>
      </section>

      <section class="panel">
        <div class="section-title">Top creators</div>
        <div id="creator-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="section-title">Top videos</div>
        <div id="video-list" class="list"></div>
      </section>

      <div class="actions">
        <button id="export-json" class="btn">Export JSON</button>
        <button id="export-csv" class="btn ghost">Export CSV</button>
      </div>
    </main>

    <footer class="footer">Data stays local Ľ No keys stored</footer>
    <script src="popup.js"></script>
  </body>
</html>
